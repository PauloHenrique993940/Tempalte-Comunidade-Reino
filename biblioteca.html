<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblioteca | Comunidade do Reino</title>
    <meta
      name="description"
      content="Biblioteca da Comunidade do Reino com livros, apostilas, estudos bíblicos, devocionais, downloads, pesquisa, categorias e destaques."
    />
    <link
      rel="canonical"
      href="https://comunidadedoreino.org.br/biblioteca.html"
    />
    <meta property="og:title" content="Biblioteca | Comunidade do Reino" />
    <meta
      property="og:description"
      content="Livros, apostilas, estudos bíblicos, devocionais e materiais para download."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Nunito+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>

  <body class="biblioteca-page">
    <div data-component="header"></div>
    <main id="conteudo">
      <section class="page-hero">
        <div class="container"></div>
      </section>
      <section class="section">
        <div class="container">
          <div class="searchbar">
            <input
              data-search="#biblioteca"
              type="search"
              placeholder="Pesquisar por título, tema ou categoria"
              aria-label="Pesquisar na biblioteca"
            /><button class="btn btn-primary" type="button">Pesquisar</button>
          </div>
          <div class="filters" data-filter-group="#biblioteca">
            <button class="filter-btn is-active" data-filter="todos">
              Todos</button
            ><button class="filter-btn" data-filter="livros">Livros</button
            ><button class="filter-btn" data-filter="apostilas">
              Apostilas</button
            ><button class="filter-btn" data-filter="estudos">
              Estudos Bíblicos</button
            ><button class="filter-btn" data-filter="devocionais">
              Devocionais</button
            ><button class="filter-btn" data-filter="downloads">
              Downloads
            </button>
          </div>
          <div id="biblioteca" class="grid grid-3">
            <article class="card" data-category="livros" data-search-item>
              <div class="media-card">
                <img
                  src="assets/biblioteca/capas/espanholEm27Dias.png"
                  alt="Capa de livro genérica"
                />
              </div>
              <span class="tag">Livro</span>
              <div class="card-footer">
                <button
                  class="btn btn-ghost"
                  type="button"
                  data-open-book="espanhol-em-27-dias"
                >
                  Ver detalhes
                </button>
              </div>
            </article>
            <article class="card" data-category="livros" data-search-item>
              <div class="media-card">
                <img
                  src="assets/biblioteca/capas/aCaçada.png"
                  alt="Capa de livro genérica"
                />
              </div>
              <span class="tag">Livro</span>
              <div class="card-footer">
                <button
                  class="btn btn-ghost"
                  type="button"
                  data-open-book="a-cacada"
                >
                  Ver detalhes
                </button>
              </div>
            </article>
            <article class="card" data-category="livros" data-search-item>
              <div class="media-card">
                <img
                  src="assets/biblioteca/capas/desvendandoAExcelencia.png"
                  alt="Capa de livro genérica"
                />
              </div>
              <span class="tag">Livro</span>
              <div class="card-footer">
                <button
                  class="btn btn-ghost"
                  type="button"
                  data-open-book="desvendando-a-excelencia"
                >
                  Ver detalhes
                </button>
              </div>
            </article>
            <article class="card" data-category="livros" data-search-item>
              <div class="media-card">
                <img
                  src="assets/biblioteca/capas/presosEInjusticados.png"
                  alt="Capa de livro genérica"
                />
              </div>
              <span class="tag">Livro</span>
              <div class="card-footer">
                <button
                  class="btn btn-ghost"
                  type="button"
                  data-open-book="presos-e-injusticados"
                >
                  Ver detalhes
                </button>
              </div>
            </article>
            <article class="card" data-category="livros" data-search-item>
              <div class="media-card">
                <img
                  src="assets/biblioteca/capas/Proverbios.png"
                  alt="Capa de livro genérica"
                />
              </div>
              <span class="tag">Livro</span>
              <div class="card-footer">
                <button
                  class="btn btn-ghost"
                  type="button"
                  data-open-book="proverbios"
                >
                  Ver detalhes
                </button>
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>
    <div class="modal-overlay" id="bookModal" hidden aria-hidden="true">
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="bookModalTitle"
      >
        <button
          class="modal-close"
          type="button"
          data-close-modal
          aria-label="Fechar modal"
        ></button>
        <div class="modal-grid">
          <div class="modal-detail">
            <div class="detail-card">
              <div class="detail-cover">
                <img
                  src="assets/biblioteca/capas/espanholEm27Dias.jpg"
                  alt="Capa de livro"
                />
              </div>
              <div class="detail-body">
                <span class="tag">Livro</span>
                <h2 id="bookModalTitle" data-book-title>Espanhol em 27 dias</h2>
                <p class="detail-author">Gilberto (Luzidio Smith)</p>
                <div
                  class="detail-rating"
                  aria-label="Avaliação de 4.5 de 5 estrelas"
                >
                  <i data-lucide="star">⭐⭐⭐</i>
                  <i data-lucide="star"></i>
                  <i data-lucide="star"></i>
                  <span class="detail-rating-value">4.5</span>
                  <button
                    class="icon-btn"
                    type="button"
                    aria-label="Compartilhar"
                  >
                    <i data-lucide="share-2"></i>
                  </button>
                </div>
                <div class="modal-actions">
                  <button class="btn btn-primary" type="button" data-read-book>
                    Emprestar
                  </button>
                  <button
                    class="btn btn-outline"
                    type="button"
                    data-preview-book
                  >
                    Pré-visualização
                  </button>
                </div>
                <p class="detail-description" data-book-description></p>
                <div class="detail-extra" data-book-extra hidden>
                  <p class="detail-full-text" data-book-fulltext></p>
                </div>

                <div
                  class="detail-testimonial-box"
                  data-book-testimonial
                  hidden
                >
                  <blockquote class="detail-testimonial">
                    <p data-book-testimonial-text></p>
                    <cite data-book-testimonial-author></cite>
                  </blockquote>
                </div>
                <button
                  class="detail-more"
                  type="button"
                  data-toggle-description
                >
                  Ver mais
                </button>
                <button
                  class="detail-more"
                  type="button"
                  data-toggle-testimonial
                >
                  Ver depoimento
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-overlay" id="pdfModal" hidden aria-hidden="true">
      <div
        class="modal modal--wide"
        role="dialog"
        aria-modal="true"
        aria-labelledby="pdfModalTitle"
      >
        <button
          class="modal-close"
          type="button"
          data-close-pdf-modal
          aria-label="Fechar leitura"
        >
          ×
        </button>
        <div class="modal-grid pdf-reader">
          <div class="pdf-reader-header">
            <div class="pdf-controls">
              <button class="btn btn-ghost" type="button" data-prev-pdf-page>
                Anterior
              </button>
              <span class="pdf-page-label"
                ><span data-pdf-page-number>1</span> /
                <span data-pdf-page-count>0</span></span
              >
              <button class="btn btn-ghost" type="button" data-next-pdf-page>
                Próxima
              </button>
              <button class="btn btn-ghost" type="button" data-pdf-zoom-out>
                −
              </button>
              <button class="btn btn-ghost" type="button" data-pdf-zoom-in>
                +
              </button>
            </div>
          </div>
          <div class="pdf-viewer"></div>
        </div>
      </div>
    </div>
    <div data-component="footer"></div>
    <script
      src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"
      defer
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.min.js"
      defer
    ></script>
    <script src="assets/js/books-data.js" defer></script>
    <script src="assets/js/app.js" defer></script>
  </body>
</html>
