<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil do Candidato | Comunidade do Reino</title>
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div data-component="header"></div>
    <main id="conteudo">
        <section class="page-hero">
            <div class="container">
                <nav class="breadcrumb"><a href="index.html">Início</a><span>/</span><span>Perfil</span></nav>
                <p class="eyebrow">Dados do candidato</p>
                <h1>Perfil do candidato.</h1>
            </div>
        </section>
        <section class="section">
            <div class="container">
                <form class="card form-grid" data-demo-form>
                    <div class="field"><label for="foto">Foto</label><input id="foto" type="file" accept="image/*" />
                    </div>
                    <div class="field"><label for="curriculo">Currículo</label><input id="curriculo" type="file" />
                    </div>
                    <div class="field"><label for="habilidades">Habilidades</label><input id="habilidades" /></div>
                    <div class="field"><label for="interesse">Áreas de interesse</label><input id="interesse"
                            placeholder="Projetos, biblioteca, podcasts..." /></div>
                    <div class="field form-full"><label for="bio">Resumo pessoal</label><textarea id="bio"></textarea>
                    </div><button class="btn btn-primary form-full" type="submit">Salvar perfil</button>
                </form>
            </div>
        </section>
    </main>
    <div data-component="footer"></div>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="assets/js/app.js" defer></script>
</body>

</html>
