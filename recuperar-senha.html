<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar Senha | Comunidade do Reino</title>
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Nunito+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div data-component="header"></div>
    <main id="conteudo">
        <section class="section auth-hero">
            <div class="container grid grid-2">
                <div>
                    <p class="eyebrow">Acesso</p>
                    <h1>Recuperar senha.</h1>
                    <p class="lead">Informe seu e-mail para receber instruções quando a autenticação estiver integrada.
                    </p>
                </div>
                <form class="card" data-demo-form>
                    <div class="field"><label for="email">E-mail</label><input id="email" type="email" required /></div>
                    <button class="btn btn-primary mt-16" type="submit">Enviar instruções</button>
                </form>
            </div>
        </section>
    </main>
    <div data-component="footer"></div>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="assets/js/app.js" defer></script>
</body>

</html>
