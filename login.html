<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Comunidade do Reino</title>
    <meta name="description" content="Acesse a área do candidato da Comunidade do Reino." />
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div data-component="header"></div>
    <main id="conteudo">
        <section class="section">
            <div class="container grid grid-2">
                <div>
                    <p class="eyebrow">Área do candidato</p>
                    <h1>Entrar.</h1>
                    <p class="lead">Acesso preparado para autenticação futura.</p>
                </div>
                <form class="card form-grid" data-demo-form>
                    <div class="field form-full"><label for="email">E-mail</label><input id="email" type="email"
                            required /></div>
                    <div class="field form-full"><label for="senha">Senha</label><input id="senha" type="password"
                            required /></div><button class="btn btn-primary form-full" type="submit">Entrar</button>
                    <p class="form-full"><a href="recuperar-senha.html">Recuperar senha</a> · <a
                            href="cadastro.html">Criar cadastro</a></p>
                </form>
            </div>
        </section>
    </main>
    <div data-component="footer"></div>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="assets/js/app.js" defer></script>
</body>

</html>
