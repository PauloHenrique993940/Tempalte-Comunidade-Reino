<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro | Comunidade do Reino</title>
    <meta name="description" content="Crie cadastro para acompanhar candidatura na Comunidade do Reino." />
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Nunito+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div data-component="header"></div>
    <main id="conteudo">
        <section class="section">
            <div class="container grid grid-2">
                <div>
                    <p class="eyebrow">Novo cadastro</p>
                    <h1>Criar conta de candidato.</h1>
                    <p class="lead">Após o cadastro, o candidato poderá acompanhar candidatura, documentos e mensagens.
                    </p>
                </div>
                <form class="card form-grid" data-demo-form>
                    <div class="field"><label for="nome">Nome</label><input id="nome" required /></div>
                    <div class="field"><label for="email">E-mail</label><input id="email" type="email" required /></div>
                    <div class="field"><label for="senha">Senha</label><input id="senha" type="password" required />
                    </div>
                    <div class="field"><label for="confirmar">Confirmar senha</label><input id="confirmar"
                            type="password" required /></div><label class="form-full"><input type="checkbox" required />
                        Aceito os termos e política de privacidade.</label><button class="btn btn-primary form-full"
                        type="submit">Cadastrar</button>
                </form>
            </div>
        </section>
    </main>
    <div data-component="footer"></div>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="assets/js/app.js" defer></script>
</body>

</html>
